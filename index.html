  <title>Buscador de pelĂ­culas Pro</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; background: #f4f4f4; color: #111; display: flex; justify-content: center; padding: 30px; }
    .container { width: 100%; max-width: 700px; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .search-box { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    input { flex: 1; min-width: 220px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    button { padding: 12px 18px; border: none; border-radius: 8px; background: #111; color: white; cursor: pointer; font-size: 16px; transition: 0.2s; }
    button:disabled { background: #666; cursor: not-allowed; }
    .results { display: none; }
    .results.active { display: block; }
    .movie-title { font-size: 20px; margin-bottom: 14px; border-left: 4px solid #111; padding-left: 10px; }
    .correction-note { font-size: 13px; color: #666; margin-bottom: 14px; font-style: italic; }
    .links { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .link-card { display: block; text-decoration: none; color: #111; background: #fafafa; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px; transition: 0.15s ease; }
    .link-card:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.06); background: #fff; border-color: #111; }
    .link-card strong { display: block; margin-bottom: 4px; color: #000; }
    .link-card span { font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Buscador de pelĂ­culas</h1>
    <p>Escribe el nombre y puedes activar/desactivar la autocorrecciĂłn.</p>

    <div class="search-box">
      <input type="text" id="movieInput" placeholder="Ej: Avatarr" autocomplete="off" />
      <button id="toggleAuto">AutocorrecciĂłn: ACTIVADO</button>
      <button id="searchBtn">Buscar</button>
    </div>

    <div class="results" id="results">
      <div class="movie-title" id="movieTitle"></div>
      <div class="correction-note" id="correctionNote"></div>
      <div class="links" id="links"></div>
    </div>
  </div>

  <script>

    const sites = [
  { name: "Cuevana 3",     searchUrl: "https://cue.cuevana3.nu/?s=" },
  { name: "GnulaHD",       searchUrl: "https://ww3.gnulahd.nu/?s=" },
  { name: "Peliculas Pro", searchUrl: "https://peliculaspro.org/?s=" },
  { name: "Peelink2",      searchUrl: "https://www.peelink2.com/?s=" },
  { name: "CineCalidad",   searchUrl: "https://www.cinecalidad.rs/?s=" },
  { name: "Pelispedia",    searchUrl: "https://pelispedia.casa/?s=" },
  { name: "Pelisflix",     searchUrl: "https://pelisflix200.net/?s=" },
  { name: "TioPlus",       isSlug: true },
  { name: "PelisPlusHD",   searchUrl: "https://www.pelisplushd.la/search?s=" }
];

const movieInput     = document.getElementById("movieInput");
const searchBtn      = document.getElementById("searchBtn");
const toggleAutoBtn  = document.getElementById("toggleAuto");
const resultsEl      = document.getElementById("results");
const movieTitle     = document.getElementById("movieTitle");
const correctionNote = document.getElementById("correctionNote");
const linksContainer = document.getElementById("links");

let autoCorrectionEnabled = true;

toggleAutoBtn.addEventListener("click", () => {
  autoCorrectionEnabled = !autoCorrectionEnabled;
  toggleAutoBtn.textContent = `AutocorrecciĂłn: ${autoCorrectionEnabled ? "ACTIVADO" : "DESACTIVADO"}`;
});

const stripKeywords = s =>
  s
    .replace(/\s*\((movie|film|pelicula|pelĂ­cula|serie|series)\)\s*$/i, '')
    .replace(/\s*(movies|movie|films|film|pelicula|pelĂ­cula|serie|series)\s*$/i, '')
    .trim();

const cleanQuery = q =>
  q.split(' ')
   .map(w => w.replace(/(.)\1+/g, '$1'))
   .join(' ')
   .trim();

const googleSuggest = q => new Promise(resolve => {
  const id = 'gc_' + Math.random().toString(36).slice(2);
  const script = document.createElement('script');
  const done = r => {
    delete window[id];
    script.parentNode?.removeChild(script);
    resolve(r);
  };
  window[id] = data => done(data?.[1]?.[0] ?? null);
  script.onerror = () => done(null);
  script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q + ' movie')}&callback=${id}`;
  document.body.appendChild(script);
});

const wikiSuggest = async q => {
  try {
    const r = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&list=search` +
      `&srsearch=${encodeURIComponent(q + ' film')}&srlimit=1&srinfo=suggestion&srprop=&format=json&origin=*`
    );
    const d = await r.json();
    return d?.query?.searchinfo?.suggestion
        ?? d?.query?.search?.[0]?.title
        ?? null;
  } catch {
    return null;
  }
};

const levenshtein = (a, b) => {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) =>
    Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1]
        ? dp[i - 1][j - 1]
        : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
};

const isWordSafeCorrection = (origWord, corrWord) => {
  const o = origWord.toLowerCase();
  const c = corrWord.toLowerCase();
  if (o === c) return true;
  const dist = levenshtein(o, c);
  const threshold = Math.max(2, Math.ceil(Math.max(o.length, c.length) * 0.4));
  return dist <= threshold;
};

const isSafeCorrection = (original, corrected) => {
  const o = original.toLowerCase().trim();
  const c = corrected.toLowerCase().trim();

  if (o === c) return false;
  if (/\((movie|film|pelicula|pelĂ­cula|serie|series)\)/i.test(c)) return false;
  if (/\b(movie|film|pelicula|pelĂ­cula|serie|series)\b/i.test(c) && !/\b(movie|film|pelicula|pelĂ­cula|serie|series)\b/i.test(o)) {
    return false;
  }

  const origWords = o.split(/\s+/);
  const corrWords = c.split(/\s+/);

  if (Math.abs(origWords.length - corrWords.length) > 0) return false;

  for (let i = 0; i < origWords.length; i++) {
    if (!isWordSafeCorrection(origWords[i], corrWords[i])) return false;
  }

  return true;
};

const getCorrection = async raw => {
  const cleaned = cleanQuery(raw);
  const wasDeRepeated = cleaned.toLowerCase() !== raw.toLowerCase();

  const [googleRaw, wikiRaw] = await Promise.all([
    googleSuggest(cleaned),
    wikiSuggest(cleaned)
  ]);

  const google = googleRaw ? stripKeywords(googleRaw) : null;
  const wiki   = wikiRaw ? stripKeywords(wikiRaw) : null;

  if (google && isSafeCorrection(cleaned, google)) {
    return { corrected: google, changed: true };
  }

  if (wiki && isSafeCorrection(cleaned, wiki)) {
    return { corrected: wiki, changed: true };
  }

  if (wasDeRepeated) {
    return { corrected: cleaned, changed: true };
  }

  return { corrected: raw, changed: false };
};

const slugifyTioPlus = query => {
  return query
    .toLowerCase()
    .replace(/\((.*?)\)/g, '')
    .replace(/[ĂˇĂ Ă¤Ă˘]/g, 'a')
    .replace(/[Ă©Ă¨Ă«ĂŞ]/g, 'e')
    .replace(/[Ă­Ă¬ĂŻĂ®]/g, 'i')
    .replace(/[ĂłĂ˛Ă¶Ă´]/g, 'o')
    .replace(/[ĂşĂąĂĽĂ»]/g, 'u')
    .replace(/Ă±/g, 'n')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
};

const renderLinks = query => {
  const q = encodeURIComponent(query);
  linksContainer.innerHTML = '';

  sites.forEach(site => {
    const a = document.createElement('a');
    a.className = 'link-card';

    if (site.name === "TioPlus") {
      a.href = `https://tioplus.app/pelicula/${slugifyTioPlus(query)}`;
    } else {
      a.href = site.searchUrl + q;
    }

    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `<strong>${site.name}</strong><span>Ver resultados</span>`;
    linksContainer.appendChild(a);
  });
};

const handleSearch = async () => {
  const raw = movieInput.value.trim();
  if (!raw) return;

  searchBtn.disabled = true;
  searchBtn.textContent = 'Buscando...';
  correctionNote.textContent = '';

  let finalQuery = raw;
  let changed = false;

  if (autoCorrectionEnabled) {
    const result = await getCorrection(raw);
    finalQuery = result.corrected;
    changed = result.changed;
    movieInput.value = finalQuery;
  }

  correctionNote.textContent = changed ? `Corregido de: "${raw}"` : '';
  movieTitle.innerHTML = `Buscando: <strong>${finalQuery}</strong>`;

  renderLinks(finalQuery);
  resultsEl.classList.add('active');

  searchBtn.disabled = false;
  searchBtn.textContent = 'Buscar';
};

searchBtn.addEventListener('click', handleSearch);
movieInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch();
});
  </script>
